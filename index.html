<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumi World</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .bg-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: cover;
            background-position: center;
            transition: opacity 2s ease-in-out;
        }
        #light-world { opacity: 0; }
        .restored #light-world { opacity: 1; }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-black overflow-hidden m-0 p-0 font-sans">
    <div id="dark-world" class="bg-layer" style="background-image: url('bg-dark.jpg');"></div>
    <div id="light-world" class="bg-layer" style="background-image: url('bg-light.jpg');"></div>
    <div class="fixed top-8 left-0 w-full px-8 z-20">
        <div class="bg-gray-800/50 rounded-full h-4 w-full overflow-hidden border border-white/20">
            <div id="progress-bar" class="bg-yellow-400 h-full w-0 transition-all duration-1000 shadow-[0_0_15px_#fbbf24]"></div>
        </div>
        <p class="text-white text-center mt-2 text-sm tracking-widest font-bold">世界修復進度</p>
    </div>
    <div class="fixed bottom-40 left-1/2 -translate-x-1/2 z-10 w-48 floating">
        <img src="lumi.png" alt="Lumi" class="w-full">
        <div class="bg-white/90 p-3 rounded-2xl mt-4 text-gray-800 text-sm font-bold shadow-xl">
            <p id="lumi-text">守護者，我感覺到能量正在枯竭...</p>
        </div>
    </div>
    <div class="fixed bottom-8 left-0 w-full px-6 z-20 flex gap-4 overflow-x-auto pb-4">
        <button onclick="completeTask(this, 33)" class="shrink-0 bg-white/20 backdrop-blur-md border border-white/40 text-white px-6 py-4 rounded-2xl active:scale-95 transition-all">
            <span class="block text-2xl mb-1">🦷</span>
            <span class="text-xs font-bold">淨化之咒</span>
        </button>
        <button onclick="completeTask(this, 33)" class="shrink-0 bg-white/20 backdrop-blur-md border border-white/40 text-white px-6 py-4 rounded-2xl active:scale-95 transition-all">
            <span class="block text-2xl mb-1">🧸</span>
            <span class="text-xs font-bold">重整秩序</span>
        </button>
        <button onclick="completeTask(this, 34)" class="shrink-0 bg-white/20 backdrop-blur-md border border-white/40 text-white px-6 py-4 rounded-2xl active:scale-95 transition-all">
            <span class="block text-2xl mb-1">🥦</span>
            <span class="text-xs font-bold">能量萃取</span>
        </button>
    </div>
    <script>
        let currentEnergy = 0;
        function completeTask(btn, energy) {
            if (btn.disabled) return;
            btn.disabled = true;
            btn.style.opacity = "0.5";
            if (navigator.vibrate) navigator.vibrate(200);
            currentEnergy += energy;
            document.getElementById('progress-bar').style.width = currentEnergy + "%";
            const texts = ["太棒了！光回來了！", "謝謝你，森林在笑呢！", "黑霧正在散去！"];
            document.getElementById('lumi-text').innerText = texts[Math.floor(Math.random() * texts.length)];
            if (currentEnergy >= 100) {
                document.body.classList.add('restored');
                document.getElementById('lumi-text').innerText = "世界恢復了！你是最棒的守護者！";
            }
        }
    </script>
</body>
</html>
