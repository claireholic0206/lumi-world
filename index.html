<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumi World MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; }
        .view.active { display: block; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .floating { animation: float 3s ease-in-out infinite; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800">

    <!-- 1. 開場故事頁面 -->
    <div id="view-story" class="view active">
        <div class="h-screen flex flex-col items-center justify-center p-8 text-center bg-gray-900 text-white">
            <div class="w-full flex justify-center mb-8">
                <img src="lumi.png" alt="Lumi" class="w-48 h-48 object-contain floating">
            </div>
            <h1 class="text-2xl font-bold mb-4">我們的世界失去了光...</h1>
            <p class="text-gray-400 mb-10 leading-relaxed">你願意幫助我們，讓森林再次恢復生機嗎？</p>
            <button onclick="showView('home')" class="bg-white text-gray-900 px-12 py-4 rounded-full font-bold shadow-lg active:scale-95 transition-transform">
                開始冒險！
            </button>
        </div>
    </div>

    <!-- 2. 孩子首頁 / 今日任務 -->
    <div id="view-home" class="view">
        <div class="p-6 pb-32">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-3">
                    <img src="lumi.png" alt="Lumi" class="w-12 h-12 object-contain bg-white rounded-full p-1 shadow-sm">
                    <div>
                        <div class="text-xs text-gray-500 uppercase tracking-wider">Little Guardian</div>
                        <div class="font-black text-xl">Lv.1</div>
                    </div>
                </div>
                <div class="bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 flex items-center gap-2">
                    <span class="text-xl">⭐</span>
                    <span id="score-display" class="font-black text-lg text-yellow-600">0</span>
                </div>
            </div>
            <h2 class="font-bold mb-5 text-xl">今日任務</h2>
            <div id="task-list" class="space-y-4"></div>
        </div>
    </div>

    <!-- 4. 世界地圖頁面 -->
    <div id="view-map" class="view">
        <div class="h-screen flex flex-col p-6 text-center">
            <h2 class="font-bold text-xl mb-6">遺忘森林</h2>
            <div class="flex-1 bg-green-50 rounded-3xl border-2 border-dashed border-green-200 flex flex-col items-center justify-center p-6 mb-32">
                <p id="map-hint" class="text-gray-400">地圖修復中...</p>
                <div class="w-full bg-gray-200 h-4 rounded-full mt-4 overflow-hidden">
                    <div id="map-progress" class="bg-green-500 h-full transition-all duration-1000" style="width: 0%"></div>
                </div>
                <p class="text-xs text-green-600 mt-2 font-bold">目前修復進度: <span id="progress-text">0</span>%</p>
            </div>
        </div>
    </div>

    <!-- P1. 家長管理介面 -->
    <div id="view-parent" class="view">
        <div class="p-6 pb-32">
            <h2 class="font-bold text-xl text-purple-700 mb-6">家長後台</h2>
            <div class="bg-purple-50 p-6 rounded-2xl mb-8">
                <p class="text-sm text-purple-600 font-bold mb-2">總光能量</p>
                <div class="text-3xl font-black text-purple-900"><span id="parent-score">0</span></div>
            </div>
            <div class="bg-white border border-gray-100 p-5 rounded-2xl shadow-sm mb-6">
                <h3 class="font-bold mb-4 text-gray-700">＋ 新增自訂任務</h3>
                <!-- 任務管理列表 -->
<div class="mt-8">
    <h3 class="font-bold mb-4 text-gray-700">現有任務管理</h3>
    <div id="parent-task-manage-list" class="space-y-2">
        <!-- 這裡會由 JS 動態生成 -->
    </div>
</div>
                <input id="new-task-name" type="text" placeholder="任務名稱" class="w-full border-b-2 border-purple-100 py-2 mb-4 outline-none">
                <input id="new-task-energy" type="number" placeholder="能量值" class="w-full border-b-2 border-purple-100 py-2 mb-6 outline-none">
                <button onclick="addNewTask()" class="w-full py-3 bg-purple-600 text-white rounded-xl font-bold">加入清單</button>
            </div>
            <button onclick="if(confirm('確定要清空進度嗎？')) { localStorage.clear(); location.reload(); }" class="w-full py-3 text-red-400 text-sm">重置所有數據</button>
        </div>
    </div>

    <!-- 全局導覽列 (關鍵：放在 view 之外) -->
    <nav id="global-nav" class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-md border-t border-gray-100 flex justify-around p-4 z-40 hidden">
        <button onclick="showView('home')" class="flex flex-col items-center gap-1">
            <span class="text-xl">🌿</span><span class="text-[10px] font-bold text-gray-500">任務</span>
        </button>
        <button onclick="showView('map')" class="flex flex-col items-center gap-1">
            <span class="text-xl">🗺️</span><span class="text-[10px] font-bold text-gray-500">世界</span>
        </button>
        <button onclick="showView('parent')" class="flex flex-col items-center gap-1">
            <span class="text-xl">⚙️</span><span class="text-[10px] font-bold text-gray-500">家長</span>
        </button>
    </nav>

    <!-- 完成任務彈窗 -->
    <div id="reward-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="relative bg-white rounded-[40px] p-8 w-[85%] max-w-sm text-center shadow-2xl transform scale-90 opacity-0 transition-all duration-300" id="modal-content">
            <div class="text-4xl mb-4">✨</div>
            <h2 class="text-3xl font-black text-green-600 mb-2">太棒了！</h2>
            <div class="my-6 relative">
                <img src="lumi.png" class="w-32 h-32 mx-auto floating" alt="Lumi">
            </div>
            <p class="text-gray-500 mb-1">你完成了任務！</p>
            <div class="text-2xl font-black text-yellow-500 mb-8">+<span id="modal-energy-amount"></span> 光能量</div>
            <button onclick="closeModal()" class="w-full py-4 bg-green-500 text-white rounded-2xl font-bold text-lg shadow-lg active:scale-95 transition-transform">繼續加油！</button>
        </div>
    </div>

    <script>
        // 1. 初始化數據
        let currentEnergy = parseInt(localStorage.getItem('lumi_energy')) || 0;
        let taskData = JSON.parse(localStorage.getItem('lumi_tasks')) || [
            { id: 1, name: "刷牙", icon: "🦷", energy: 10 },
            { id: 2, name: "整理書包", icon: "🎒", energy: 15 },
            { id: 3, name: "寫作業", icon: "📖", energy: 20 }
        ];
        const targetEnergy = 200;

        // 2. 頁面加載邏輯
        window.onload = function() {
            refreshUI();
        };

        function refreshUI() {
            document.getElementById('score-display').innerText = currentEnergy;
            const pScore = document.getElementById('parent-score');
            if (pScore) pScore.innerText = currentEnergy;
        }

        // 3. 頁面導覽
        function showView(viewName) {
            // 1. 隱藏所有頁面容器
            document.querySelectorAll('.view').forEach(v => {
                v.classList.remove('active');
            });
            
            // 2. 顯示點擊的目標頁面
            const targetView = document.getElementById('view-' + viewName);
            if (targetView) {
                targetView.classList.add('active');
            }
            
            // 3. 處理導覽列的顯示與隱藏
            const nav = document.getElementById('global-nav');
            if (nav) {
                if (viewName === 'story') {
                    nav.classList.add('hidden'); // 故事頁面隱藏導覽列
                } else {
                    nav.classList.remove('hidden'); // 其他頁面（home, map, parent）都顯示
                }
            }
        
            // 4. 針對不同頁面執行對應的更新渲染
            if (viewName === 'home') renderTasks();
            if (viewName === 'map') updateMapProgress();
            if (viewName === 'parent') renderParentTaskList();
        }

        // 4. 任務邏輯
        function renderTasks() {
            const container = document.getElementById('task-list');
            container.innerHTML = ''; 
            taskData.forEach(task => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-2xl shadow-sm border border-gray-50 flex justify-between items-center active:bg-gray-50";
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-3xl">${task.icon}</span>
                        <span class="font-bold text-lg">${task.name}</span>
                    </div>
                    <div class="bg-yellow-50 text-yellow-600 px-3 py-1 rounded-lg font-black">+${task.energy}</div>
                `;
                card.onclick = () => handleTaskClick(task);
                container.appendChild(card);
            });
        }

        function handleTaskClick(task) {
            currentEnergy += task.energy;
            localStorage.setItem('lumi_energy', currentEnergy);
            refreshUI();

            document.getElementById('modal-energy-amount').innerText = task.energy;
            const modal = document.getElementById('reward-modal');
            const content = document.getElementById('modal-content');
            modal.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('scale-90', 'opacity-0');
                content.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeModal() {
            const content = document.getElementById('modal-content');
            content.classList.add('scale-90', 'opacity-0');
            setTimeout(() => {
                document.getElementById('reward-modal').classList.add('hidden');
            }, 300);
        }

        // 5. 家長端新增功能
        function addNewTask() {
    const nameInput = document.getElementById('new-task-name');
    const energyInput = document.getElementById('new-task-energy');
    
    const name = nameInput.value.trim();
    const energy = parseInt(energyInput.value);

    if (name && !isNaN(energy)) {
        // 建立新任務物件
        const newTask = {
            id: Date.now(), // 使用時間戳作為唯一 ID，方便刪除
            name: name,
            icon: "✨", 
            energy: energy
        };
        
        // 更新數據清單
        taskData.push(newTask);
        
        // 儲存到 LocalStorage
        localStorage.setItem('lumi_tasks', JSON.stringify(taskData));
        
        // 清空輸入欄位
        nameInput.value = '';
        energyInput.value = '';
        
        alert("✅ 任務新增成功！");
        
        // 自動跳轉回首頁，讓家長看到成果
        showView('home'); 
    } else {
        alert("請輸入有效的任務名稱與能量值喔！");
    }
}

            function updateMapProgress() {
                const percentage = Math.min((currentEnergy / targetEnergy) * 100, 100);
                document.getElementById('map-progress').style.width = percentage + '%';
                document.getElementById('progress-text').innerText = Math.floor(percentage);
            }
            function updateMapProgress() {
        // 設定目標值，例如 200 分可以完全恢復森林
        const targetEnergy = 200; 
        
        // 計算百分比，最高不超過 100%
        const percentage = Math.min((currentEnergy / targetEnergy) * 100, 100);
        
        // 更新進度條寬度
        const progressBar = document.getElementById('map-progress');
        if (progressBar) {
            progressBar.style.width = percentage + '%';
        }
        
        // 更新文字顯示
        const progressText = document.getElementById('progress-text');
        if (progressText) {
            progressText.innerText = Math.floor(percentage);
        }
        
        // PM 的小細節：如果進度滿了，改變提示文字
        const mapHint = document.getElementById('map-hint');
        if (mapHint && percentage >= 100) {
            mapHint.innerText = "🌳 森林已恢復生機！你是最棒的守護者！";
            mapHint.classList.add('text-green-600', 'font-bold');
        }
                function renderParentTaskList() {
    const container = document.getElementById('parent-task-manage-list');
    if (!container) return;
    
    container.innerHTML = '';
    taskData.forEach(task => {
        const item = document.createElement('div');
        item.className = "flex justify-between items-center bg-white p-3 rounded-xl border border-gray-100 text-sm";
        item.innerHTML = `
            <div class="flex items-center gap-2">
                <span>${task.icon}</span>
                <span class="font-medium">${task.name}</span>
                <span class="text-gray-400">(${task.energy}分)</span>
            </div>
            <button onclick="deleteTask(${task.id})" class="text-red-400 hover:text-red-600 p-2">
                🗑️
            </button>
        `;
        container.appendChild(item);
    });
}

function deleteTask(id) {
    if (confirm("確定要刪除這個任務嗎？")) {
        // 過濾掉該 ID 的任務
        taskData = taskData.filter(t => t.id !== id);
        // 儲存更新後的清單
        localStorage.setItem('lumi_tasks', JSON.stringify(taskData));
        // 重新渲染管理介面
        renderParentTaskList();
    }
}
}
    </script>
</body>
</html>
