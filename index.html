<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumi World MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .view { display: none; } /* 預設所有頁面隱藏 */
        .view.active { display: block; } /* 只有帶有 active 的頁面才顯示 */
    </style>
</head>
<body class="bg-slate-100 font-sans">

    <!-- 1. 開場故事頁面 -->
    <div id="view-story" class="view active">
        <div class="h-screen flex flex-col items-center justify-center p-8 text-center">
            <div class="w-48 h-48 bg-gray-300 rounded-full mb-8 flex items-center justify-center">Lumi 圖示</div>
            <h1 class="text-xl font-bold mb-4">我們的世界失去了光...</h1>
            <p class="text-gray-600 mb-8">你願意幫助我們，讓森林再次恢復生機嗎？</p>
            <button onclick="showView('home')" class="bg-gray-800 text-white px-10 py-3 rounded-full">開始冒險！</button>
        </div>
    </div>

    <!-- 2. 孩子首頁 / 今日任務 -->
    <div id="view-home" class="view">
        <div class="p-6">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-green-200 rounded-full"></div>
                    <div>
                        <div class="text-xs text-gray-500">小小守護者</div>
                        <div class="font-bold">Lv.1</div>
                    </div>
                </div>
                <div class="bg-white px-4 py-1 rounded-full shadow-sm flex items-center gap-2">
                    <span class="text-yellow-500">⭐</span>
                    <span id="score-display" class="font-bold">0</span>
                </div>
            </div>

            <h2 class="font-bold mb-4 text-lg text-gray-700">今日任務</h2>
            <div id="task-list" class="space-y-4">
                <!-- 任務會透過 JavaScript 動態產生在這裡 -->
            </div>

            <!-- 底部導覽列 -->
            <div class="fixed bottom-0 left-0 w-full bg-white border-t flex justify-around p-4 text-xs text-gray-400">
                <button onclick="showView('home')" class="text-green-600">任務</button>
                <button onclick="showView('map')">世界</button>
                <button>Lumi</button>
                <button onclick="showView('parent')">家長</button>
            </div>
        </div>
    </div>

    <!-- 4. 世界地圖頁面 -->
    <div id="view-map" class="view">
        <div class="p-6 text-center">
            <h2 class="font-bold text-lg mb-8">遺忘森林</h2>
            <div class="aspect-square bg-green-50 rounded-3xl border-2 border-dashed border-green-200 flex items-center justify-center mb-8">
                這裡將會是地圖
            </div>
            <button onclick="showView('home')" class="text-blue-500 underline">返回任務</button>
        </div>
    </div>

    <!-- P1. 家長後台 (簡版) -->
    <div id="view-parent" class="view">
        <div class="p-6">
            <h2 class="font-bold text-lg mb-4 text-purple-700">家長管理後台</h2>
            <p class="text-sm text-gray-600 mb-8">在這裡你可以查看孩子的進度並管理任務。</p>
            <button onclick="showView('home')" class="bg-purple-100 text-purple-700 px-4 py-2 rounded-lg">回孩子視角</button>
        </div>
    </div>

    <script>
        // 核心邏輯：頁面切換
        function showView(viewName) {
            // 隱藏所有頁面
            document.querySelectorAll('.view').forEach(view => {
                view.classList.remove('active');
            });
            // 顯示指定頁面
            document.getElementById('view-' + viewName).classList.add('active');
        }
    </script>
</body>
</html>
